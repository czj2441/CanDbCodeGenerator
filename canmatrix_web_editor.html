<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CanMatrix Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(0.15 0.005 260);
  --bg-panel: oklch(0.18 0.005 260);
  --bg-raised: oklch(0.22 0.005 260);
  --bg-hover: oklch(0.26 0.005 260);
  --bg-active: oklch(0.30 0.01 260);
  --border: oklch(0.30 0.005 260);
  --border-light: oklch(0.33 0.005 260);
  --text: oklch(0.92 0.005 260);
  --text-dim: oklch(0.60 0.005 260);
  --text-muted: oklch(0.45 0.005 260);
  --accent: oklch(0.68 0.18 155);
  --accent-dim: oklch(0.45 0.12 155);
  --warn: oklch(0.72 0.17 80);
  --danger: oklch(0.60 0.20 25);
  --info: oklch(0.72 0.14 240);
  --signal-bg: oklch(0.20 0.02 155 / 0.15);
  --signal-bg-alt: oklch(0.20 0.02 155 / 0.08);
  --radius-sm: 3px;
  --radius: 6px;
  --radius-lg: 10px;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow: 0 4px 12px oklch(0 0 0 / 0.4);
  --font-sans: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'DM Mono', 'Cascadia Code', 'Fira Code', monospace;
  --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Bar ── */
.topbar {
  display: flex; align-items: center; height: 48px; padding: 0 16px;
  background: var(--bg-panel); border-bottom: 1px solid var(--border);
  gap: 8px; user-select: none;
}
.topbar-logo {
  font-weight: 700; font-size: 15px; letter-spacing: -0.02em;
  margin-right: 16px; color: var(--text);
}
.topbar-logo span { color: var(--accent); }

.topbar-filename {
  font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
  padding: 2px 10px; background: var(--bg); border-radius: var(--radius-sm);
  border: 1px solid var(--border); min-width: 160px; outline: none;
  transition: border-color var(--transition);
}
.topbar-filename:focus { border-color: var(--accent); }

.btn {
  display: inline-flex; align-items: center; gap: 6px; height: 30px;
  padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text-dim);
  font-family: var(--font-sans); font-size: 12.5px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: all var(--transition);
}
.btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-light); }
.btn:active { background: var(--bg-active); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.btn-accent { background: oklch(0.25 0.05 155); border-color: oklch(0.35 0.08 155); color: var(--accent); }
.btn-accent:hover { background: oklch(0.30 0.06 155); }
.btn-danger { border-color: oklch(0.35 0.06 25); color: var(--danger); }
.btn-danger:hover { background: oklch(0.25 0.04 25); border-color: oklch(0.40 0.08 25); }
.btn-icon { padding: 0; width: 30px; justify-content: center; font-size: 15px; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--bg-hover); }
.topbar-spacer { flex: 1; }

/* ── Loading Overlay ── */
.loading-overlay {
  position: fixed; inset: 0; background: oklch(0 0 0 / 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; backdrop-filter: blur(2px);
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Main Layout ── */
.main {
  display: grid; grid-template-columns: 260px 1fr 300px;
  height: calc(100% - 48px); gap: 0;
}

/* ── Left Sidebar ── */
.sidebar {
  background: var(--bg-panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); user-select: none;
}
.sidebar-header .btn-icon { width: 26px; height: 26px; font-size: 17px; }
.message-list { flex: 1; overflow-y: auto; padding: 4px 0; }

.message-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  cursor: pointer; transition: all var(--transition);
  border-left: 2px solid transparent; user-select: none;
}
.message-item:hover { background: var(--bg-hover); }
.message-item.active { background: var(--bg-active); border-left-color: var(--accent); }
.message-id {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent);
  background: oklch(0.25 0.03 155 / 0.6); padding: 1px 6px;
  border-radius: var(--radius-sm); min-width: 54px; text-align: center; font-weight: 500;
}
.message-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.message-signal-count { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

.empty-messages {
  padding: 40px 20px; text-align: center; color: var(--text-muted);
  font-size: 13px; line-height: 1.8;
}
.loading-messages {
  padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;
}
.error-messages {
  padding: 20px; text-align: center; color: var(--danger); font-size: 13px; line-height: 1.8;
}
.error-messages button { margin-top: 10px; }

/* ── Center Panel ── */
.center { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.center-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; border-bottom: 1px solid var(--border); min-height: 44px;
}
.center-title {
  font-weight: 600; font-size: 13px; color: var(--text-dim); letter-spacing: 0.04em;
}
.center-title strong { color: var(--text); font-weight: 600; }
.signal-toolbar { display: flex; gap: 6px; }

.signal-table-wrap { flex: 1; overflow: auto; }
.signal-table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 900px; }
.signal-table th {
  position: sticky; top: 0; z-index: 2; background: var(--bg-panel);
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-dim); padding: 8px 10px;
  text-align: left; border-bottom: 1px solid var(--border); user-select: none;
}
.signal-table td { padding: 0; border-bottom: 1px solid oklch(0.25 0.005 260); }
.signal-table tr:hover td { background: var(--bg-hover); }
.signal-table tr:nth-child(even) td { background: var(--signal-bg-alt); }
.signal-table tr:nth-child(even):hover td { background: var(--bg-hover); }

.signal-table input {
  width: 100%; height: 34px; padding: 4px 10px;
  border: 1px solid transparent; background: transparent;
  color: var(--text); font-family: var(--font-sans); font-size: 12.5px;
  outline: none; transition: border-color var(--transition), background var(--transition);
}
.signal-table input:focus { border-color: var(--accent); background: var(--bg-active); z-index: 1; position: relative; }
.signal-table input.hex { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
.signal-table input.mono { font-family: var(--font-mono); font-size: 11px; }
.signal-table .col-id { width: 55px; }
.signal-table .col-name { width: 140px; }
.signal-table .col-start { width: 60px; }
.signal-table .col-len { width: 50px; }
.signal-table .col-order { width: 70px; }
.signal-table .col-factor { width: 75px; }
.signal-table .col-offset { width: 70px; }
.signal-table .col-min { width: 70px; }
.signal-table .col-max { width: 70px; }
.signal-table .col-unit { width: 60px; }
.signal-table .col-comment { width: auto; }
.signal-table .col-actions { width: 60px; }
.signal-table td.col-actions { padding: 4px 6px; text-align: center; }

.signal-table .action-delete {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border: none; background: transparent;
  color: var(--text-muted); cursor: pointer; border-radius: var(--radius-sm);
  font-size: 14px; transition: all var(--transition);
}
.signal-table .action-delete:hover { color: var(--danger); background: oklch(0.30 0.04 25); }

.empty-signals { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
.error-signals { padding: 40px 20px; text-align: center; color: var(--danger); font-size: 13px; line-height: 1.8; }

/* ── Right Panel ── */
.panel {
  background: var(--bg-panel); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.panel-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.panel-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 12px; user-select: none;
}
.field { margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }
.field-label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; user-select: none; }
.field-input {
  width: 100%; height: 32px; padding: 4px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font-sans); font-size: 13px; outline: none;
  transition: border-color var(--transition);
}
.field-input:focus { border-color: var(--accent); }
.field-input.mono { font-family: var(--font-mono); font-size: 12px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field textarea.field-input { height: 60px; resize: vertical; font-size: 12px; }
.panel-empty { padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 12px; }
.panel-loading { padding: 30px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* ── Status Bar ── */
.statusbar {
  height: 24px; display: flex; align-items: center; padding: 0 12px;
  background: var(--bg-panel); border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text-muted); gap: 16px; user-select: none;
}
.statusbar-item { font-family: var(--font-mono); }
.statusbar-spacer { flex: 1; }
.statusbar-error { color: var(--danger); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 40px; right: 20px;
  padding: 10px 18px; background: var(--bg-raised);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 13px; box-shadow: var(--shadow);
  opacity: 0; transform: translateY(8px);
  transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--danger); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: oklch(0 0 0 / 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 2000; backdrop-filter: blur(2px);
}
.modal-overlay.hidden { display: none; }
.modal-panel {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius-lg); width: 440px; max-width: 92vw;
  box-shadow: var(--shadow); overflow: hidden;
}
.modal-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 14px; user-select: none;
}
.modal-body { padding: 16px 18px; max-height: 70vh; overflow-y: auto; }
.modal-footer {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}
.modal-field { margin-bottom: 12px; }
.modal-field:last-child { margin-bottom: 0; }
.modal-field label {
  display: block; font-size: 11px; color: var(--text-dim);
  margin-bottom: 4px; user-select: none;
}
.modal-field input, .modal-field select {
  width: 100%; height: 32px; padding: 4px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font-sans); font-size: 13px; outline: none;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
.modal-field input.mono { font-family: var(--font-mono); font-size: 12px; }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-hint {
  font-size: 11px; color: var(--text-muted); margin-top: 4px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Can<span>Matrix</span></div>
  <input class="topbar-filename" value="untitled.canmatrix" spellcheck="false" id="filename">
  <span class="topbar-spacer"></span>
  <button class="btn" onclick="doNew()" title="新建">New</button>
  <button class="btn" onclick="doImport()" title="导入">Import</button>
  <button class="btn btn-accent" onclick="doExport('dbc')" title="导出 DBC">Export</button>
  <button class="btn" onclick="doSave()" title="保存">Save</button>
  <span class="topbar-spacer"></span>
  <span style="font-size:11px;color:var(--text-muted)" id="apiStatus">● API</span>
</div>

<div class="main">
  <!-- Left: Message List -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Messages</span>
      <button class="btn btn-icon btn-ghost" onclick="addMessage()" title="添加报文">+</button>
    </div>
    <div class="message-list" id="messageList">
      <div class="loading-messages">Loading...</div>
    </div>
  </div>

  <!-- Center: Signal Table -->
  <div class="center">
    <div class="center-header">
      <div class="center-title" id="centerTitle">Select a message</div>
      <div class="signal-toolbar" id="signalToolbar" style="display:none">
        <button class="btn" onclick="addSignal()" title="添加信号">+ Signal</button>
        <button class="btn btn-accent" onclick="showBatchSignalModal()" title="批量添加信号">Batch +</button>
        <button class="btn btn-danger" onclick="deleteSelectedMessage()" title="删除报文">Delete Msg</button>
      </div>
    </div>
    <div class="signal-table-wrap" id="signalTableWrap">
      <div class="empty-signals">Select a message from the sidebar to view its signals.</div>
    </div>
  </div>

  <!-- Right: Message Editor Panel -->
  <div class="panel" id="panel">
    <div class="panel-empty">No message selected.<br>Click a message to edit its properties.</div>
  </div>
</div>

<div class="statusbar">
  <span class="statusbar-item" id="statusMsgCount">0 messages</span>
  <span class="statusbar-item" id="statusSigCount">0 signals</span>
  <span class="statusbar-spacer"></span>
  <span id="statusModified"></span>
  <span id="statusError" class="statusbar-error"></span>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Batch Signal Modal -->
<div class="modal-overlay hidden" id="batchSignalModal">
  <div class="modal-panel">
    <div class="modal-header">Batch Add Signals</div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Name template (use {n} for number)</label>
        <input class="mono" id="batchNameTemplate" value="PTA{n:02d}_AdVal" spellcheck="false">
        <div class="modal-hint">Use {n} for 1,2,3 or {n:02d} for 01,02,03</div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Count</label>
          <input class="mono" id="batchCount" type="number" value="8" min="1" max="64">
        </div>
        <div class="modal-field">
          <label>Start number</label>
          <input class="mono" id="batchStartNum" type="number" value="1" min="0">
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Start bit</label>
          <input class="mono" id="batchStartBit" type="number" value="0" min="0" max="63">
        </div>
        <div class="modal-field">
          <label>Bit step</label>
          <input class="mono" id="batchBitStep" type="number" value="8" min="1" max="64">
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Length</label>
          <input class="mono" id="batchLength" type="number" value="8" min="1" max="64">
        </div>
        <div class="modal-field">
          <label>Byte order</label>
          <select id="batchByteOrder">
            <option value="little_endian">little_endian</option>
            <option value="big_endian">big_endian</option>
          </select>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Factor</label>
          <input class="mono" id="batchFactor" type="number" step="any" value="1.0">
        </div>
        <div class="modal-field">
          <label>Offset</label>
          <input class="mono" id="batchOffset" type="number" step="any" value="0.0">
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Min</label>
          <input class="mono" id="batchMin" type="number" step="any" value="0.0">
        </div>
        <div class="modal-field">
          <label>Max</label>
          <input class="mono" id="batchMax" type="number" step="any" value="0.0">
        </div>
      </div>
      <div class="modal-field">
        <label>Unit</label>
        <input id="batchUnit" value="">
      </div>
      <div class="modal-field">
        <label>Comment template (optional, use {n})</label>
        <input id="batchCommentTemplate" value="" spellcheck="false">
        <div class="modal-hint">Example: ADC channel {n} raw value</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="hideBatchSignalModal()">Cancel</button>
      <button class="btn btn-accent" onclick="batchAddSignals()">Create</button>
    </div>
  </div>
</div>

<script>
// ── API Configuration ──
const API_BASE = 'http://localhost:8080';

// ── Global State ──
let selectedMsgId = null;
let messagesCache = null;     // Full detail cache: {id: {name, dlc, signals: [...]}}
let messageListCache = null;  // Lightweight list from GET /api/messages
let isLoading = false;

// ── Session Management ──
let currentSessionId = localStorage.getItem('canmatrix_session_id') || '';
let currentFileName = localStorage.getItem('canmatrix_file_name') || '';

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (currentSessionId) {
    opts.headers['X-Session-Id'] = currentSessionId;
  }
  if (body !== undefined && body !== null) {
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API_BASE + path, opts);
  const json = await res.json();
  if (!res.ok || !json.success) {
    throw new Error(json.error || `HTTP ${res.status}`);
  }
  return json.data;
}

function setSession(sessionId, fileName) {
  currentSessionId = sessionId;
  currentFileName = fileName;
  localStorage.setItem('canmatrix_session_id', sessionId);
  localStorage.setItem('canmatrix_file_name', fileName);
}

function clearSession() {
  currentSessionId = '';
  currentFileName = '';
  localStorage.removeItem('canmatrix_session_id');
  localStorage.removeItem('canmatrix_file_name');
}

// ── Helpers ──
function toHex(n) { return '0x' + n.toString(16).toUpperCase().padStart(3, '0'); }
function parseHex(s) { return parseInt(s, 16) || 0; }

// ── Loading ──
function showLoading() {
  isLoading = true;
  $('#loadingOverlay').classList.remove('hidden');
}
function hideLoading() {
  isLoading = false;
  $('#loadingOverlay').classList.add('hidden');
}

// ── Toast ──
let toastTimer;
function toast(text, isError) {
  const el = $('#toast');
  el.textContent = text;
  el.classList.add('show');
  if (isError) el.classList.add('error'); else el.classList.remove('error');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); el.classList.remove('error'); }, 2000);
}

// ── Status Bar ──
function updateStatus(msgCount, sigCount, modified) {
  $('#statusMsgCount').textContent = `${msgCount} message${msgCount !== 1 ? 's' : ''}`;
  $('#statusSigCount').textContent = `${sigCount} signal${sigCount !== 1 ? 's' : ''}`;
  $('#statusModified').textContent = modified ? 'Modified' : '';
  $('#statusError').textContent = '';
}

function statusError(msg) {
  $('#statusError').textContent = msg;
}

async function refreshStatusFromApi() {
  try {
    const d = await api('GET', '/api/status');
    updateStatus(d.message_count, d.signal_count, d.modified);
  } catch (e) {
    statusError('API offline');
  }
}

// ── Message List ──
async function loadMessageList() {
  const container = $('#messageList');
  container.innerHTML = '<div class="loading-messages">Loading...</div>';

  try {
    messageListCache = await api('GET', '/api/messages');

    if (messageListCache.length === 0) {
      container.innerHTML = '<div class="empty-messages">No messages yet.<br>Click + to add one.</div>';
      return;
    }

    container.innerHTML = messageListCache.map(m => {
      const active = m.id === selectedMsgId ? ' active' : '';
      return `<div class="message-item${active}" data-id="${m.id}" onclick="selectMessage(${m.id})">
        <span class="message-id">${m.id_hex}</span>
        <span class="message-name">${escHtml(m.name || '(unnamed)')}</span>
        <span class="message-signal-count">${m.signal_count}s</span>
      </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div class="error-messages">Failed to load messages<br><small>${escHtml(e.message)}</small><br><button class="btn" onclick="loadMessageList()">Retry</button></div>`;
    statusError('API error');
  }
}

// ── Signal Table ──
async function loadSignalTable() {
  const wrap = $('#signalTableWrap');
  const title = $('#centerTitle');
  const toolbar = $('#signalToolbar');

  if (selectedMsgId == null) {
    wrap.innerHTML = '<div class="empty-signals">Select a message from the sidebar to view its signals.</div>';
    title.textContent = 'Select a message';
    toolbar.style.display = 'none';
    return;
  }

  wrap.innerHTML = '<div class="loading-messages" style="padding:40px">Loading signals...</div>';
  toolbar.style.display = 'flex';

  try {
    const msg = await api('GET', `/api/messages/${selectedMsgId}`);
    messagesCache = messagesCache || {};
    messagesCache[selectedMsgId] = msg;

    title.innerHTML = `<strong>${escHtml(msg.name || '(unnamed)')}</strong> &mdash; ${toHex(msg.id)} &middot; ${msg.signals.length} signal${msg.signals.length !== 1 ? 's' : ''}`;
    toolbar.style.display = 'flex';

    if (msg.signals.length === 0) {
      wrap.innerHTML = '<div class="empty-signals">No signals defined.<br>Click + Signal to add one.</div>';
      return;
    }

    const headers = ['#', 'Name', 'Start', 'Len', 'Order', 'Factor', 'Offset', 'Min', 'Max', 'Unit', 'Comment', ''];
    const colClasses = ['col-id', 'col-name', 'col-start', 'col-len', 'col-order', 'col-factor', 'col-offset', 'col-min', 'col-max', 'col-unit', 'col-comment', 'col-actions'];

    let html = '<table class="signal-table"><thead><tr>';
    headers.forEach((h, i) => { html += `<th class="${colClasses[i]}">${h}</th>`; });
    html += '</tr></thead><tbody>';

    msg.signals.forEach((sig, idx) => {
      html += `<tr data-sig-idx="${idx}">`;
      html += td('col-id', `<input class="hex" value="${idx}" readonly style="opacity:0.5">`);
      html += td('col-name', `<input value="${escAttr(sig.name)}" data-field="name" data-idx="${idx}">`);
      html += td('col-start', `<input class="mono" value="${sig.start_bit}" data-field="start_bit" data-idx="${idx}" type="number">`);
      html += td('col-len', `<input class="mono" value="${sig.length}" data-field="length" data-idx="${idx}" type="number">`);
      html += td('col-order', `<input class="mono" value="${escAttr(sig.byte_order)}" data-field="byte_order" data-idx="${idx}">`);
      html += td('col-factor', `<input class="mono" value="${sig.factor}" data-field="factor" data-idx="${idx}" type="number" step="any">`);
      html += td('col-offset', `<input class="mono" value="${sig.offset}" data-field="offset" data-idx="${idx}" type="number" step="any">`);
      html += td('col-min', `<input class="mono" value="${sig.min_val}" data-field="min_val" data-idx="${idx}" type="number" step="any">`);
      html += td('col-max', `<input class="mono" value="${sig.max_val}" data-field="max_val" data-idx="${idx}" type="number" step="any">`);
      html += td('col-unit', `<input value="${escAttr(sig.unit)}" data-field="unit" data-idx="${idx}">`);
      html += td('col-comment', `<input value="${escAttr(sig.comment)}" data-field="comment" data-idx="${idx}">`);
      html += td('col-actions', `<button class="action-delete" onclick="deleteSignal(${idx})" title="删除信号">&times;</button>`);
      html += '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="error-signals">Failed to load signals<br><small>${escHtml(e.message)}</small><br><button class="btn" onclick="loadSignalTable()">Retry</button></div>`;
    statusError('API error');
  }
}

function td(cls, inner) { return `<td class="${cls}">${inner}</td>`; }

async function applyPanelField(field, val) {
  if (selectedMsgId == null) return;
  try {
    await api('PUT', `/api/messages/${selectedMsgId}`, { [field]: val });
    // Update cache
    if (messagesCache && messagesCache[selectedMsgId]) {
      messagesCache[selectedMsgId][field] = val;
    }
    refreshStatusFromApi();
    // Refresh message list to update name display
    loadMessageList();
  } catch (e) {
    toast(e.message, true);
  }
}

async function applyPanelId() {
  if (selectedMsgId == null) return;
  const newId = parseHex($('#panelId').value);
  if (newId === selectedMsgId) return;
  try {
    await api('PUT', `/api/messages/${selectedMsgId}`, { id: newId });
    if (messagesCache) {
      messagesCache[newId] = messagesCache[selectedMsgId];
      delete messagesCache[selectedMsgId];
    }
    selectedMsgId = newId;
    await refreshAll();
    toast('ID updated');
  } catch (e) {
    toast(e.message, true);
    loadPanel(); // Reset UI
  }
}

// ── Selection ──
async function selectMessage(id) {
  selectedMsgId = id;
  await refreshAll();
}

// ── Signal Table Edit ──
document.addEventListener('change', async (e) => {
  const inp = e.target;
  if (!inp.dataset.field || selectedMsgId == null) return;
  const idx = parseInt(inp.dataset.idx);
  const field = inp.dataset.field;

  let val = inp.value;
  if (field === 'start_bit' || field === 'length') val = parseInt(val) || 0;
  else if (field === 'factor' || field === 'offset' || field === 'min_val' || field === 'max_val') val = parseFloat(val) || 0;

  try {
    await api('PUT', `/api/messages/${selectedMsgId}/signals/${idx}`, { [field]: val });

      messagesCache[selectedMsgId].signals[idx][field] = val;
    }
    refreshStatusFromApi();
  } catch (e) {
    toast(e.message, true);
    loadSignalTable(); // Reload to revert
  }
});

// ── Message Operations ──
async function addMessage() {
  const maxId = messageListCache && messageListCache.length > 0
    ? Math.max(...messageListCache.map(m => m.id)) + 0x10
    : 0x100;
  try {
    const body = {
      id: toHex(maxId),
      name: `NewMessage_${toHex(maxId)}`,
      dlc: 8,
      cycle_time: 0,
      sender: '',
      comment: '',
      signals: [],
    };
    await api('POST', '/api/messages', body);
    selectedMsgId = maxId;
    await refreshAll();
    toast(`Added ${toHex(maxId)}`);
  } catch (e) {
    toast(e.message, true);
  }
}

async function deleteSelectedMessage() {
  if (selectedMsgId == null) return;
  const id = selectedMsgId;
  if (!confirm(`Delete message ${toHex(id)} and all its signals?`)) return;
  try {
    await api('DELETE', `/api/messages/${id}`);
    if (messagesCache) delete messagesCache[id];
    selectedMsgId = null;
    await refreshAll();
    toast(`Deleted ${toHex(id)}`);
  } catch (e) {
    toast(e.message, true);
  }
}

async function duplicateMessage() {
  if (selectedMsgId == null) return;
  try {
    const orig = await api('GET', `/api/messages/${selectedMsgId}`);
    const maxId = messageListCache && messageListCache.length > 0
      ? Math.max(...messageListCache.map(m => m.id)) + 0x10
      : selectedMsgId + 0x10;
    const body = {
      id: toHex(maxId),
      name: orig.name + '_copy',
      dlc: orig.dlc,
      cycle_time: orig.cycle_time,
      sender: orig.sender,
      comment: orig.comment,
      signals: orig.signals,  // Deep copy handled by server
    };
    await api('POST', '/api/messages', body);
    selectedMsgId = maxId;
    await refreshAll();
    toast(`Duplicated as ${toHex(maxId)}`);
  } catch (e) {
    toast(e.message, true);
  }
}

async function deleteSignal(idx) {

// ── File Operations ──
async function doNew() {
  // Check modified state
  try {
    const s = await api('GET', '/api/status');
    if (s.modified && !confirm('Discard unsaved changes?')) return;
  } catch (_) { /* server not critical for new */ }

  try {
    const name = prompt('Database name:', 'Untitled');
    if (!name) return;
    const data = await api('POST', '/api/session', { name });
    setSession(data.session_id, data.file_name);
    messagesCache = {};
    selectedMsgId = null;
    $('#filename').value = data.file_name;
    await refreshAll();
    toast('New database');
  } catch (e) {
    toast(e.message, true);
  }
}

async function doImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.canmatrix,.toml,.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    showLoading();
    try {
      const content = await file.text();
      const dbName = file.name.replace(/\.[^.]+$/, '');
      let format = 'json';
      if (file.name.endsWith('.toml')) format = 'toml';

      // Create session first, then import content into it
      const sessionData = await api('POST', '/api/session', { name: dbName });
      setSession(sessionData.session_id, sessionData.file_name);
      await api('POST', '/api/import', { content, format });

      messagesCache = {};
      selectedMsgId = null;
      $('#filename').value = file.name;
      await refreshAll();
      toast(`Imported: ${file.name}`);
    } catch (err) {
      toast('Import failed: ' + err.message, true);
    } finally {
      hideLoading();
    }
  };
  input.click();
}

async function doExport(format) {
  format = format || 'json';
  showLoading();
  try {
    const data = await api('POST', '/api/export', { format });
    const mime = format === 'dbc' ? 'text/plain'
      : format === 'toml' ? 'text/plain'
      : 'application/json';
    const ext = format === 'dbc' ? '.dbc'
      : format === 'toml' ? '.toml'
      : '.canmatrix';
    const blob = new Blob([data.content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (currentFileName || 'export').replace(/\.[^.]+$/, '') + ext;
    a.click();
    URL.revokeObjectURL(url);
    toast(`Exported as ${format.toUpperCase()}`);
  } catch (e) {
    toast('Export failed: ' + e.message, true);
  } finally {
    hideLoading();
  }
}

async function doSave() {
  // With session-based auto-save, data is already persisted.
  // Save exports the current state as a downloadable file.
  await doExport('json');
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', (e) => {
  // ESC closes modal if open
  if (e.key === 'Escape' && !$('#batchSignalModal').classList.contains('hidden')) {
    e.preventDefault();
    hideBatchSignalModal();
    return;
  }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); doSave(); }
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); doNew(); }
  if (e.ctrlKey && e.key === 'c') { e.preventDefault(); copySelected(); }
  if (e.ctrlKey && e.key === 'v') { e.preventDefault(); pasteSelected(); }
  if (e.ctrlKey && e.key === 'x') { e.preventDefault(); cutSelected(); }
  if (e.key === 'Delete' && selectedMsgId != null && document.activeElement === document.body) {
    deleteSelectedMessage();
  }
});

// ── Util ──
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
const $ = (s) => document.querySelector(s);

// ── Batch Signal Creator ──
function showBatchSignalModal() {
  if (selectedMsgId == null) {
    toast('Select a message first', true);
    return;
  }
  $('#batchSignalModal').classList.remove('hidden');
}

function hideBatchSignalModal() {
  $('#batchSignalModal').classList.add('hidden');
}

// Close modal on ESC or click outside
$('#batchSignalModal').addEventListener('click', (e) => {
  if (e.target === $('#batchSignalModal')) hideBatchSignalModal();
});

function expandTemplate(template, n) {
  return template.replace(/{n(?::(\d+)[dD]?)?}/g, (match, width) => {
    const numStr = String(n);
    if (width) {
      return numStr.padStart(parseInt(width), '0');
    }
    return numStr;
  });
}

async function batchAddSignals() {
  if (selectedMsgId == null) return;

  const nameTemplate = $('#batchNameTemplate').value || 'Sig{n}';
  const count = Math.min(Math.max(parseInt($('#batchCount').value) || 1, 1), 64);
  const startNum = parseInt($('#batchStartNum').value) || 1;
  const startBit = parseInt($('#batchStartBit').value) || 0;
  const bitStep = parseInt($('#batchBitStep').value) || 8;
  const length = parseInt($('#batchLength').value) || 8;
  const byteOrder = $('#batchByteOrder').value || 'little_endian';
  const factor = parseFloat($('#batchFactor').value) || 1.0;
  const offset = parseFloat($('#batchOffset').value) || 0.0;
  const minVal = parseFloat($('#batchMin').value) || 0.0;
  const maxVal = parseFloat($('#batchMax').value) || 0.0;
  const unit = $('#batchUnit').value || '';
  const commentTemplate = $('#batchCommentTemplate').value || '';

  // Validate: prevent signals exceeding 64 bits
  const lastEnd = startBit + (count - 1) * bitStep + length;
  if (lastEnd > 64) {
    toast(`Last signal ends at bit ${lastEnd - 1}, exceeds 63. Reduce count or step.`, true);
    return;
  }

  showLoading();
  let created = 0;
  try {
    for (let i = 0; i < count; i++) {
      const n = startNum + i;
      const name = expandTemplate(nameTemplate, n);
      const comment = commentTemplate ? expandTemplate(commentTemplate, n) : '';
      const sb = startBit + i * bitStep;

      const body = {
        name: name,
        start_bit: sb,
        length: length,
        byte_order: byteOrder,
        factor: factor,
        offset: offset,
        min_val: minVal,
        max_val: maxVal,
        unit: unit,
        comment: comment,
      };
      await api('POST', `/api/messages/${selectedMsgId}/signals`, body);
      created++;
    }
    if (messagesCache) delete messagesCache[selectedMsgId];
    await loadSignalTable();
    await refreshStatusFromApi();
    toast(`Created ${created} signals`);
    hideBatchSignalModal();
  } catch (e) {
    toast(`Batch create failed at #${created + 1}: ${e.message}`, true);
  } finally {
    hideLoading();
  }
}

// ── Clipboard ──
let clipboard = null; // { type: 'signal'|'message', data: {...} }

function getTargetSignalIdx(el) {
  const row = el.closest('tr[data-sig-idx]');
  return row ? parseInt(row.dataset.sigIdx) : null;
}

function copySelected() {
  if (selectedMsgId == null) return;
  const activeEl = document.activeElement;
  // 如果在信号表单元格中，复制该行信号
  if (activeEl && activeEl.closest('.signal-table')) {
    const idx = getTargetSignalIdx(activeEl);
    if (idx != null && messagesCache && messagesCache[selectedMsgId]) {
      const sig = messagesCache[selectedMsgId].signals[idx];
      clipboard = { type: 'signal', data: JSON.parse(JSON.stringify(sig)) };
      toast('Signal copied');
      return;
    }
  }
  // 否则复制当前选中的整个报文
  if (messagesCache && messagesCache[selectedMsgId]) {
    const msg = messagesCache[selectedMsgId];
    clipboard = { type: 'message', data: JSON.parse(JSON.stringify(msg)) };
    toast('Message copied');
  }
}

async function cutSelected() {
  if (selectedMsgId == null) return;
  const activeEl = document.activeElement;
  if (activeEl && activeEl.closest('.signal-table')) {
    const idx = getTargetSignalIdx(activeEl);
    if (idx != null) {
      await copySelected();
      await deleteSignal(idx);
      toast('Signal cut');
      return;
    }
  }
  await copySelected();
  await deleteSelectedMessage();
  toast('Message cut');
}

async function pasteSelected() {
  if (!clipboard || selectedMsgId == null) return;
  try {
    if (clipboard.type === 'signal') {
      const sig = JSON.parse(JSON.stringify(clipboard.data));
      sig.name = sig.name ? sig.name + '_copy' : 'PastedSig';
      await api('POST', `/api/messages/${selectedMsgId}/signals`, sig);
      if (messagesCache) delete messagesCache[selectedMsgId];
      await loadSignalTable();
      await refreshStatusFromApi();
      toast('Signal pasted');
    } else if (clipboard.type === 'message') {
      const msg = JSON.parse(JSON.stringify(clipboard.data));
      const maxId = messageListCache && messageListCache.length > 0
        ? Math.max(...messageListCache.map(m => m.id)) + 0x10
        : msg.id + 0x10;
      msg.id = maxId;
      msg.name = (msg.name || 'PastedMsg') + '_copy';
      await api('POST', '/api/messages', msg);
      if (messagesCache) delete messagesCache[msg.id];
      selectedMsgId = maxId;
      await refreshAll();
      toast('Message pasted');
    }
  } catch (e) {
    toast('Paste failed: ' + e.message, true);
  }
}

// ── Context Menu ──
let contextMenuEl = null;

function initContextMenu() {
  contextMenuEl = document.createElement('div');
  contextMenuEl.id = 'ctxMenu';
  contextMenuEl.style.cssText = `
    position:fixed; z-index:2000; min-width:160px;
    background:var(--bg-raised); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:4px 0; display:none; user-select:none;
  `;
  document.body.appendChild(contextMenuEl);
  document.addEventListener('click', () => { contextMenuEl.style.display = 'none'; });
}

function ctxItem(label, action, danger) {
  const div = document.createElement('div');
  div.textContent = label;
  div.style.cssText = `
    padding:8px 14px; font-size:13px; cursor:pointer;
    color:${danger ? 'var(--danger)' : 'var(--text)'};
  `;
  div.addEventListener('mouseenter', () => { div.style.background = 'var(--bg-hover)'; });
  div.addEventListener('mouseleave', () => { div.style.background = ''; });
  div.addEventListener('click', (e) => { e.stopPropagation(); action(); contextMenuEl.style.display = 'none'; });
  return div;
}

function showContextMenu(e) {
  if (!contextMenuEl) initContextMenu();
  contextMenuEl.innerHTML = '';
  contextMenuEl.style.display = 'none';

  const row = e.target.closest('tr[data-sig-idx]');
  if (row && selectedMsgId != null) {
    // 右键信号行
    const idx = parseInt(row.dataset.sigIdx);
    contextMenuEl.appendChild(ctxItem('Copy Signal', () => {
      if (messagesCache && messagesCache[selectedMsgId]) {
        const sig = messagesCache[selectedMsgId].signals[idx];
        clipboard = { type: 'signal', data: JSON.parse(JSON.stringify(sig)) };
        toast('Signal copied');
      }
    }));
    contextMenuEl.appendChild(ctxItem('Cut Signal', async () => {
      if (messagesCache && messagesCache[selectedMsgId]) {
        const sig = messagesCache[selectedMsgId].signals[idx];
        clipboard = { type: 'signal', data: JSON.parse(JSON.stringify(sig)) };
      }
      await deleteSignal(idx);
      toast('Signal cut');
    }));
    contextMenuEl.appendChild(ctxItem('Paste Signal', async () => {
      if (clipboard && clipboard.type === 'signal') {
        const sig = JSON.parse(JSON.stringify(clipboard.data));
        sig.name = sig.name ? sig.name + '_copy' : 'PastedSig';
        await api('POST', `/api/messages/${selectedMsgId}/signals`, sig);
        if (messagesCache) delete messagesCache[selectedMsgId];
        await loadSignalTable();
        await refreshStatusFromApi();
        toast('Signal pasted');
      }
    }, !clipboard || clipboard.type !== 'signal'));
    contextMenuEl.appendChild(ctxItem('Delete Signal', () => deleteSignal(idx), true));
  } else if (e.target.closest('.message-item') && selectedMsgId != null) {
    // 右键报文项
    contextMenuEl.appendChild(ctxItem('Copy Message', async () => {
      if (messagesCache && messagesCache[selectedMsgId]) {
        clipboard = { type: 'message', data: JSON.parse(JSON.stringify(messagesCache[selectedMsgId])) };
        toast('Message copied');
      }
    }));
    contextMenuEl.appendChild(ctxItem('Paste Message', async () => {
      if (clipboard && clipboard.type === 'message') {
        const msg = JSON.parse(JSON.stringify(clipboard.data));
        const maxId = messageListCache && messageListCache.length > 0
          ? Math.max(...messageListCache.map(m => m.id)) + 0x10
          : msg.id + 0x10;
        msg.id = maxId;
        msg.name = (msg.name || 'PastedMsg') + '_copy';
        await api('POST', '/api/messages', msg);
        selectedMsgId = maxId;
        await refreshAll();
        toast('Message pasted');
      }
    }, !clipboard || clipboard.type !== 'message'));
    contextMenuEl.appendChild(ctxItem('Duplicate Message', () => duplicateMessage()));
    contextMenuEl.appendChild(ctxItem('Delete Message', () => deleteSelectedMessage(), true));
  } else {
    return;
  }

  const x = Math.min(e.clientX, window.innerWidth - 180);
  const y = Math.min(e.clientY, window.innerHeight - 200);
  contextMenuEl.style.left = x + 'px';
  contextMenuEl.style.top = y + 'px';
  contextMenuEl.style.display = 'block';
  e.preventDefault();
}

document.addEventListener('contextmenu', (e) => {
  if (e.target.closest('.signal-table') || e.target.closest('.message-item')) {
    showContextMenu(e);
  }
});

async function refreshAll() {
  await Promise.all([
    loadMessageList(),
    loadSignalTable(),
    loadPanel(),
    refreshStatusFromApi(),
  ]);
}

// ── API Health Check ──
async function checkApiHealth() {
  try {
    await api('GET', '/api/status');
    $('#apiStatus').textContent = '● Connected';
    $('#apiStatus').style.color = 'var(--accent)';
  } catch (_) {
    $('#apiStatus').textContent = '● Offline';
    $('#apiStatus').style.color = 'var(--danger)';
  }
}

// ── Initialize ──
async function initEditor() {
  try {
    // 尝试恢复已有会话
    if (currentSessionId) {
      const data = await api('GET', `/api/session/${currentSessionId}`);
      if (data && data.db) {
        // 会话恢复成功，加载状态
        selectedMsgId = null;
        await refreshAll();
        checkApiHealth();
        setInterval(checkApiHealth, 15000);
        toast(`Restored: ${data.file_name}`);
        return;
      }
    }
  } catch (_) {
    // 会话过期或服务器重启，清除旧 session_id
    clearSession();
  }

  // 无可用会话，创建新的 demo 会话
  await initDemoSession();
  checkApiHealth();
  setInterval(checkApiHealth, 15000);
}

async function initDemoSession() {
  try {
    const sessionData = await api('POST', '/api/session', { name: 'DemoCAN' });
    setSession(sessionData.session_id, sessionData.file_name);

    await api('POST', '/api/messages', {
      id: '0x100', name: 'EngineStatus', dlc: 8, cycle_time: 10, sender: 'ECU1',
      signals: [
        { name: 'RPM', start_bit: 0, length: 16, factor: 0.25, unit: 'rpm', min_val: 0, max_val: 16000 },
        { name: 'Speed', start_bit: 16, length: 16, factor: 0.1, unit: 'km/h', min_val: 0, max_val: 300 },
        { name: 'Temp', start_bit: 32, length: 8, factor: 1.0, offset: -40, unit: '°C', min_val: -40, max_val: 215 },
      ],
    });

    await api('POST', '/api/messages', {
      id: '0x200', name: 'BatteryInfo', dlc: 6, cycle_time: 100, sender: 'BMS',
      signals: [
        { name: 'Voltage', start_bit: 0, length: 12, factor: 0.01, unit: 'V', min_val: 0, max_val: 500 },
        { name: 'Current', start_bit: 12, length: 12, factor: -0.1, offset: 204.7, unit: 'A', min_val: -200, max_val: 200 },
        { name: 'SoC', start_bit: 24, length: 8, factor: 0.5, unit: '%', min_val: 0, max_val: 100 },
      ],
    });

    selectedMsgId = 0x100;
    await refreshAll();
  } catch (e) {
    console.warn('Demo init failed (API not available):', e.message);
    statusError('Start API server to begin');
    $('#messageList').innerHTML = '<div class="empty-messages">API server not available.<br>Start <code>python api_server.py</code> and refresh.</div>';
    $('#signalTableWrap').innerHTML = '<div class="empty-signals">Waiting for API server...</div>';
    updateStatus(0, 0, false);
  }
}

// ── Startup ──
initEditor();
</script>
